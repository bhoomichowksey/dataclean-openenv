name: dataclean-env
version: "1.0.0"
description: Data cleaning environment for OpenEnv

sdk: docker
app_port: 7860

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

tasks:
  - name: fill_missing
    description: Fill missing values in dataset

  - name: dedup_typefix
    description: Remove duplicates and fix data types

  - name: full_pipeline
    description: Perform full data cleaning pipeline

reward:
  min: 0.0
  max: 1.0
